<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Titulo</h1>  <!-- h1 = titulo -->
    <p>paragrafo</p> <!-- p = paragrafo -->
    
    <script>
        let n1 = Number.parseFloat(window.prompt("Escreva um numero: "))
        let n2 = Number.parseFloat(window.prompt("Escreva outro numero:"))
        let s = n1 + n2
        window.confirm (`${n1} + ${n2} = ${s}`)
    </script>
</body>
</html>
